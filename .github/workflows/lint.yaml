name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HASS Add-on Lint
        uses: frenck/action-addon-linter@v3
        with:
          path: "./hermes-workspace"